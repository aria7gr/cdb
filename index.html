* { box-sizing: border-box; margin: 0; padding: 0; }

}

}
[data-theme="purple"] {

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  transition: background 0.3s, color 0.3s;
  position: relative;
}

.wrapper {
  width: 100%;
  max-width: 1000px;
}

/* ===== タイトル ===== */
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  letter-spacing: 0.4em;
  color: var(--accent);
  text-align: center;
  margin-bottom: 16px;
}

/* ===== バージョン表示 ===== */
.version {
  position: fixed;
  bottom: 12px;
  left: 12px;
  font-family: 'Roboto Mono', monospace;
  font-size: 10px;
  color: var(--dim-text);
  letter-spacing: 0.05em;
  opacity: 0.6;
  user-select: none;
  pointer-events: none;
}

/* ===== 2カラムレイアウト ===== */
.main-layout {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 16px;
  align-items: start;
}

@media (max-width: 768px) {
  .main-layout {
    grid-template-columns: 1fr;
  }
}

/* ===== 左カラム ===== */
.left-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ===== セクションラベル ===== */
.section-label {
  font-size: 12px;
  color: var(--sub-text);
  letter-spacing: 0.2em;
  margin-bottom: 4px;
  padding-left: 2px;
  text-transform: uppercase;
}

/* ===== 時計バー ===== */
.clock-bar {
  background: var(--surface);
  border: 2px solid var(--text);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.clock-time {
  font-family: 'Roboto Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.05em;
  transition: color 0.3s;
}
.clock-date {
  font-family: 'Roboto Mono', monospace;
  font-size: 14px;
  color: var(--text);
  letter-spacing: 0.08em;
  transition: color 0.3s;
}

/* UTC時のカウントダウン色変更 */
body.utc-mode .clock-time,
body.utc-mode .clock-date,
body.utc-mode .event-countdown,
body.utc-mode .event-dual-time,
body.utc-mode .card-until {
  color: var(--countdown-utc) !important;
}

/* ===== コントロールパネル ===== */
.controls {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* タイムゾーン切り替えボタン */
.tz-switch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--card1);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 7px;
  font-weight: 700;
  color: var(--text);
  flex-shrink: 0;
}
.tz-switch:hover {
  transform: scale(1.1);
  border-color: var(--accent);
}
.tz-switch.utc {
  background: var(--countdown-utc);
  color: #000;
  border-color: var(--countdown-utc);
}

.btn-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

/* テーマ丸ボタン */
.theme-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.theme-btn:hover  { transform: scale(1.15); }
.theme-btn.active { border-color: var(--text); transform: scale(1.1); }

.tb-gray   { background: radial-gradient(circle at 40% 40%, #ebebeb, #d0d0d0); border: 2px solid #b0b0b0; }

.tb-green  { background: radial-gradient(circle at 40% 40%, #4ade80, #0d1a0f); }

.tb-red    { background: radial-gradient(circle at 40% 40%, #f87171, #1a0e0e); }

/* ===== イベントタイマー（タイル化） ===== */

  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;

  flex-direction: column;
  gap: 4px;
  margin-top: 12px;
}

.event-timer:first-of-type {

}

.event-label {

  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.event-countdown {

  font-size: 26px;
  font-weight: 700;
  color: var(--countdown);
  letter-spacing: 0.02em;
  text-align: right;
  transition: color 0.3s;

.event-dual {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.event-dual-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.event-dual-time {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--countdown);
  letter-spacing: 0.02em;

.event-dual-time:first-child {

}

.event-dual-time:last-child {

  transition: background 0.3s, border-color 0.3s;

.rank-1 {

  border-color: var(--accent);

  padding: 18px;

.rank-2 {

  font-weight: 700;
  color: var(--countdown);
  line-height: 1.1;

  transition: color 0.3s;

.rank-1 .card-until { font-size: clamp(30px, 8vw, 42px); }
.rank-2 .card-until { font-size: clamp(24px, 6vw, 32px); }
.rank-3 .card-until,
.rank-4 .card-until,
.rank-5 .card-until { font-size: clamp(18px, 5vw, 24px); color: var(--sub-text); }

  flex-shrink: 0;
}

  letter-spacing: 0.1em;
  margin-bottom: 3px;

.rank-2 .card-day { font-size: 11px; }
.rank-3 .card-day,
.rank-4 .card-day,
.rank-5 .card-day { font-size: 11px; }

.rank-1 .card-slot { font-size: clamp(14px, 3.5vw, 17px); font-weight: 700; }
.rank-2 .card-slot { font-size: clamp(13px, 3vw, 15px); font-weight: 700; }

.rank-4 .card-slot,

/* NOWバッジ */

  display: inline-block;
  font-size: 9px;

  letter-spacing: 0.2em;
  color: #000;
  background: var(--accent);
  border-radius: 3px;
  padding: 2px 6px;
  margin-left: 6px;

  animation: blink 1.2s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}
</style>

<script>
const SLOTS = [

  { day:6, h:15, label:'土曜日', disp:'15:05-16:00' },
  { day:6, h:16, label:'土曜日', disp:'16:05-17:00' },
  { day:6, h:23, label:'土曜日', disp:'23:05-24:00' },
  { day:0, h: 0, label:'日曜日', disp:' 0:05- 1:00' },
  { day:0, h: 7, label:'日曜日', disp:' 7:05- 8:00' },
  { day:0, h: 8, label:'日曜日', disp:' 8:05- 9:00' },
];

const DAYS_JP = ['日','月','火','水','木','金','土'];
let isUTC = false;

// 孵化タイマー計算（ローカルタイムで計算）
function secondsUntil(now, slot) {
  const nowMs = now.getTime();
  const midnight = new Date(now);
  midnight.setHours(0,0,0,0);
  const mondayMs = midnight.getTime() - ((now.getDay()+6)%7)*86400000;
  const offset = (slot.day+6)%7;
  let startMs = mondayMs + offset*86400000 + slot.h*3600000 + 5*60000;
  const endMs = startMs + 55*60000;
  
  if (nowMs >= startMs && nowMs < endMs) return 0;
  if (startMs <= nowMs) startMs += 7*86400000;
  return Math.floor((startMs - nowMs)/1000);
}

// イベントタイマー計算（ローカルタイムで計算）
function secondsUntilEvent(now, targetDay, targetHour, targetMinute) {
  const nowMs = now.getTime();
  const midnight = new Date(now);
  midnight.setHours(0,0,0,0);
  const currentDay = now.getDay();
  
  let daysUntil = (targetDay - currentDay + 7) % 7;
  if (daysUntil === 0) {
    const todayTarget = new Date(midnight);
    todayTarget.setHours(targetHour, targetMinute, 0, 0);
    if (nowMs >= todayTarget.getTime()) {
      daysUntil = 7;
    }
  }
  
  const targetMs = midnight.getTime() + daysUntil * 86400000 + targetHour * 3600000 + targetMinute * 60000;
  return Math.floor((targetMs - nowMs) / 1000);
}

function formatCountdown(secs) {
  if (secs === 0) return 'NOW';
  const d = Math.floor(secs/86400);
  const h = Math.floor((secs%86400)/3600);
  const m = Math.floor((secs%3600)/60);
  let s = '';
  if (d > 0) s += d + '日 ';
  s += String(h).padStart(2,'0') + '時間 ';
  s += String(m).padStart(2,'0') + '分';
  return s;
}

function formatEventCountdown(secs) {
  if (secs <= 0) return '--:--';
  const d = Math.floor(secs/86400);
  const h = Math.floor((secs%86400)/3600);
  const m = Math.floor((secs%3600)/60);
  if (d > 0) return `${d}日 ${String(h).padStart(2,'0')}時間 ${String(m).padStart(2,'0')}分`;
  return `${String(h).padStart(2,'0')}時間 ${String(m).padStart(2,'0')}分`;
}

function buildCards() {
  const list = document.getElementById('card-list');
  list.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const rank = i + 1;
    const card = document.createElement('div');
    card.className = `hatch-card rank-${rank}`;
    card.id = `card-${rank}`;
    card.innerHTML = `
      <div class="card-countdown">
        <div class="card-until-label" id="c-label-${rank}"></div>
        <div class="card-until" id="c-until-${rank}"></div>
      </div>
      <div class="card-info">
        <div class="card-day" id="c-day-${rank}"></div>
        <div class="card-slot" id="c-slot-${rank}"></div>
      </div>`;
    list.appendChild(card);
  }
}

function updateCards(sorted) {
  let nextIndex = -1;
  // 最初のNOWじゃないカードを探す
  for (let i = 0; i < 5; i++) {
    if (sorted[i].secs !== 0) {
      nextIndex = i;
      break;
    }
  }
  
  for (let i = 0; i < 5; i++) {
    const item = sorted[i];
    const rank = i + 1;
    const active = item.secs === 0;
    const dayEl   = document.getElementById(`c-day-${rank}`);
    const slotEl  = document.getElementById(`c-slot-${rank}`);
    const labelEl = document.getElementById(`c-label-${rank}`);
    const untilEl = document.getElementById(`c-until-${rank}`);
    if (!dayEl) continue;
    dayEl.innerHTML = item.label + (active ? ' <span class="now-badge">NOW</span>' : '');
    slotEl.textContent  = item.disp;
    labelEl.textContent = (i === nextIndex) ? 'Next' : '';
    untilEl.textContent = formatCountdown(item.secs);
  }
}

function updateEventTimers(now) {
  const wz1 = secondsUntilEvent(now, 1, 9, 30);
  const wz2 = secondsUntilEvent(now, 1, 13, 0);
  document.getElementById('warzone1').textContent = formatEventCountdown(wz1);
  document.getElementById('warzone2').textContent = formatEventCountdown(wz2);
  
  const ah = secondsUntilEvent(now, 2, 9, 0);
  document.getElementById('anthill').textContent = formatEventCountdown(ah);
  
  const evo = secondsUntilEvent(now, 3, 10, 5);
  document.getElementById('evolution').textContent = formatEventCountdown(evo);
}

function tick() {
  const now = new Date();
  
  // 表示用の時刻（JST or UTC）
  let displayTime;
  if (isUTC) {
    displayTime = new Date(now.getTime() - 9*3600000); // JSTからUTCに変換
    const hh = String(displayTime.getUTCHours()).padStart(2,'0');
    const mm = String(displayTime.getUTCMinutes()).padStart(2,'0');
    const ss = String(displayTime.getUTCSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
    
    const year = displayTime.getUTCFullYear();
    const month = String(displayTime.getUTCMonth()+1).padStart(2,'0');
    const date = String(displayTime.getUTCDate()).padStart(2,'0');
    const day = DAYS_JP[displayTime.getUTCDay()];
    document.getElementById('date').textContent = `${year}/${month}/${date} (${day})`;
  } else {
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
    
    const year = now.getFullYear();
    const month = String(now.getMonth()+1).padStart(2,'0');
    const date = String(now.getDate()).padStart(2,'0');
    const day = DAYS_JP[now.getDay()];
    document.getElementById('date').textContent = `${year}/${month}/${date} (${day})`;
  }
  
  // カウントダウン計算はローカルタイム（JST）のまま
  const sorted = SLOTS.map(s => ({...s, secs: secondsUntil(now, s)}))
                       .sort((a,b) => a.secs - b.secs);
  updateCards(sorted);
  updateEventTimers(now);
}

// タイムゾーン切り替え
document.getElementById('tz-switch').addEventListener('click', () => {
  isUTC = !isUTC;
  const btn = document.getElementById('tz-switch');
  btn.textContent = isUTC ? 'UTC' : 'JST';
  btn.classList.toggle('utc', isUTC);
  document.body.classList.toggle('utc-mode', isUTC);
  tick();
});

// テーマ
document.getElementById('theme-btns').addEventListener('click', e => {
  const btn = e.target.closest('.theme-btn');
  if (!btn) return;
  const t = btn.dataset.theme;
  document.body.dataset.theme = (t === 'dark') ? '' : t;
  if (t === 'dark') delete document.body.dataset.theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

buildCards();
tick();
setInterval(tick, 1000);
</script>
